<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Calculator & Math Survival</title>
    <style>
        /* --- GENERAL & GARDEN THEME --- */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* Soft garden gradient background */
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #333;
        }

        /* --- CALCULATOR STYLES --- */
        .calculator {
            /* Wood-like texture/color */
            background-color: #8b5a2b; 
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), inset 0 0 10px rgba(0,0,0,0.2);
            width: 300px;
            transition: opacity 0.3s ease;
            position: relative;
        }

        /* Decorative leaf */
        .calculator::after {
            content: "🌿";
            position: absolute;
            top: -20px;
            right: -15px;
            font-size: 40px;
            filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.3));
        }

        #display {
            width: 100%;
            height: 65px;
            font-size: 32px;
            text-align: right;
            margin-bottom: 20px;
            padding: 10px 15px;
            box-sizing: border-box;
            border: 2px solid #5c3a21;
            /* Soft paper/stone look for display */
            background-color: #f4f1ea;
            border-radius: 8px;
            color: #2c3e50;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.1);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .calc-btn {
            padding: 20px 0;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #6b4423;
            border-radius: 10px;
            /* Stone/pebble buttons */
            background-color: #e3dac9; 
            color: #4a4a4a;
            transition: background-color 0.2s, transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 4px 0 #6b4423;
        }

        .calc-btn:hover { background-color: #f0e9dc; transform: translateY(2px); box-shadow: 0 2px 0 #6b4423;}
        .calc-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #6b4423; }

        .operator { background-color: #d4e157; color: #33691e; border-color: #9e9d24; box-shadow: 0 4px 0 #9e9d24;}
        .operator:hover { background-color: #e6ee9c; }

        .clear { background-color: #ef9a9a; color: #b71c1c; grid-column: span 2; border-color: #c62828; box-shadow: 0 4px 0 #c62828;}
        .clear:hover { background-color: #ffcdd2; }

        .equal { background-color: #81c784; color: #1b5e20; grid-column: span 2; border-color: #2e7d32; box-shadow: 0 4px 0 #2e7d32;}
        .equal:hover { background-color: #a5d6a7; }
        
        .zero-btn { grid-column: span 2; }

        /* --- COMPETITIVE GAME STYLES --- */
        .game-container {
            display: none;
            /* Darker, tense "night garden" arena */
            background-color: #1a2517;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(129, 199, 132, 0.4);
            width: 340px;
            text-align: center;
            border: 4px solid #81c784;
            position: relative;
            color: #fff;
        }

        .header-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 16px;
            color: #a5d6a7;
            font-family: monospace;
            font-weight: bold;
        }

        .score-display { color: #fff; font-size: 20px; }
        .high-score { color: #ffeb3b; }

        /* Timer Bar */
        .timer-container {
            width: 100%;
            height: 12px;
            background-color: #333;
            border-radius: 6px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #555;
        }

        #timerBar {
            height: 100%;
            width: 100%;
            background-color: #81c784;
            transition: width 0.1s linear, background-color 0.3s;
        }

        .question {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            margin: 20px 0;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            font-family: monospace;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: #2c3e2d;
            color: #fff;
            border: 2px solid #4a6b4a;
            padding: 15px;
            font-size: 26px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s ease;
            font-family: monospace;
            box-shadow: 0 5px 0 #1e2b1f;
        }

        .option-btn:hover { background-color: #3a523b; border-color: #81c784; transform: translateY(2px); box-shadow: 0 3px 0 #1e2b1f;}
        .option-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #1e2b1f; }

        .correct-anim { background-color: #81c784 !important; color: #000 !important; border-color: #fff !important;}
        .wrong-anim { background-color: #e53935 !important; color: #fff !important; border-color: #fff !important;}

        .game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(26, 37, 23, 0.95);
            border-radius: 12px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .game-over-title { color: #ffeb3b; font-size: 36px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;}
        .final-score { font-size: 56px; color: #fff; margin-bottom: 25px; font-family: monospace; text-shadow: 0 0 10px #81c784;}

        .action-btn {
            background-color: #2e7d32;
            color: #fff;
            border: none;
            padding: 12px 24px;
            margin: 8px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #1b5e20;
        }

        .play-again-btn { background-color: #81c784; color: #000; box-shadow: 0 4px 0 #388e3c;}
        .play-again-btn:hover { background-color: #a5d6a7; transform: translateY(2px); box-shadow: 0 2px 0 #388e3c;}
        .play-again-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #388e3c;}
        
        .exit-btn { background-color: #8d6e63; box-shadow: 0 4px 0 #5d4037;}
        .exit-btn:hover { background-color: #a1887f; transform: translateY(2px); box-shadow: 0 2px 0 #5d4037;}
        .exit-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #5d4037;}

        @keyframes flashRed {
            0% { box-shadow: inset 0 0 50px rgba(229, 57, 53, 0.8); }
            100% { box-shadow: inset 0 0 0 rgba(229, 57, 53, 0); }
        }
        .damage { animation: flashRed 0.3s ease-out; }

    </style>
</head>
<body>

<!-- Audio Elements -->
<!-- Note: We use placeholder URLs. You can replace these with actual audio files if desired, but these represent the structure for the audio. -->
<audio id="gardenAudio" loop>
    <source src="https://actions.google.com/sounds/v1/water/small_stream_with_birds.ogg" type="audio/ogg">
</audio>
<audio id="gameAudio" loop>
    <source src="https://actions.google.com/sounds/v1/science_fiction/scifi_hum_loop.ogg" type="audio/ogg">
</audio>

<!-- Standard Calculator -->
<div class="calculator" id="calculator">
    <input type="text" id="display" disabled>
    <div class="buttons">
        <button class="calc-btn clear" onclick="clearDisplay()">C</button>
        <button class="calc-btn operator" onclick="appendOperator('/')">&divide;</button>
        <button class="calc-btn operator" onclick="appendOperator('*')">&times;</button>
        
        <button class="calc-btn" onclick="appendNumber('7')">7</button>
        <button class="calc-btn" onclick="appendNumber('8')">8</button>
        <button class="calc-btn" onclick="appendNumber('9')">9</button>
        <button class="calc-btn operator" onclick="appendOperator('-')">-</button>
        
        <button class="calc-btn" onclick="appendNumber('4')">4</button>
        <button class="calc-btn" onclick="appendNumber('5')">5</button>
        <button class="calc-btn" onclick="appendNumber('6')">6</button>
        <button class="calc-btn operator" onclick="appendOperator('+')">+</button>
        
        <button class="calc-btn" onclick="appendNumber('1')">1</button>
        <button class="calc-btn" onclick="appendNumber('2')">2</button>
        <button class="calc-btn" onclick="appendNumber('3')">3</button>
        <button class="calc-btn equal" onclick="calculate()">=</button>
        
        <button class="calc-btn zero-btn" onclick="appendNumber('0')">0</button>
        <button class="calc-btn" onclick="appendNumber('.')">.</button>
    </div>
</div>

<!-- Competitive Math Survival Game -->
<div class="game-container" id="mathGame">
    <div class="header-stats">
        <div class="high-score">BEST: <span id="highScoreDisplay">0</span></div>
        <div class="score-display">SCORE: <span id="scoreDisplay">0</span></div>
    </div>
    
    <div class="timer-container">
        <div id="timerBar"></div>
    </div>

    <div class="question" id="questionDisplay">READY?</div>
    
    <div class="options-grid">
        <button class="option-btn" onclick="checkAnswer(0)" id="opt0">-</button>
        <button class="option-btn" onclick="checkAnswer(1)" id="opt1">-</button>
        <button class="option-btn" onclick="checkAnswer(2)" id="opt2">-</button>
        <button class="option-btn" onclick="checkAnswer(3)" id="opt3">-</button>
    </div>

    <!-- Game Over Overlay -->
    <div class="game-over-screen" id="gameOverScreen">
        <div class="game-over-title">Time's Up</div>
        <div class="final-score" id="finalScoreDisplay">0</div>
        <button class="action-btn play-again-btn" onclick="startMathGame()">Play Again</button>
        <button class="action-btn exit-btn" onclick="exitGame()">Calculator</button>
    </div>
</div>

<script>
    // --- AUDIO LOGIC ---
    let audioStarted = false;
    const gardenAudio = document.getElementById('gardenAudio');
    const gameAudio = document.getElementById('gameAudio');
    gardenAudio.volume = 0.4;
    gameAudio.volume = 0.6;

    // Start background audio on first interaction (required by modern browsers)
    document.body.addEventListener('click', () => {
        if (!audioStarted && !isGameActive) {
            gardenAudio.play().catch(e => console.log("Audio play prevented by browser"));
            audioStarted = true;
        }
    }, { once: true });

    function playGardenAudio() {
        if(audioStarted) {
            gameAudio.pause();
            gameAudio.currentTime = 0;
            gardenAudio.play();
        }
    }

    function playGameAudio() {
        if(audioStarted) {
            gardenAudio.pause();
            gameAudio.play();
        }
    }


    // --- CALCULATOR LOGIC ---
    let display = document.getElementById('display');
    let currentInput = '';
    let isGameActive = false;

    function appendNumber(number) {
        if (number === '.' && currentInput.includes('.')) {
            let parts = currentInput.split(/[+\-*/]/);
            if (parts[parts.length - 1].includes('.')) return;
        }
        currentInput += number;
        updateDisplay();
    }

    function appendOperator(operator) {
        if (currentInput === '') return;
        let lastChar = currentInput.slice(-1);
        if (['+', '-', '*', '/'].includes(lastChar)) {
            currentInput = currentInput.slice(0, -1) + operator;
        } else {
            currentInput += operator;
        }
        updateDisplay();
    }

    function clearDisplay() {
        currentInput = '';
        updateDisplay();
    }

    function calculate() {
        if (currentInput === '' || isGameActive) return;
        
        try {
            let result = new Function('return ' + currentInput)();
            currentInput = Math.round(result * 1000000) / 1000000;
            currentInput = currentInput.toString();
            updateDisplay();
            
            // LAUNCH THE GAME: Wait 1 second so they see the result, then start
            setTimeout(() => {
                if(currentInput !== 'Error' && currentInput !== '') {
                    showGameUI();
                    startMathGame();
                }
            }, 1000);

        } catch (error) {
            display.value = 'Error';
            currentInput = '';
        }
    }

    function updateDisplay() {
        display.value = currentInput;
    }


    // --- COMPETITIVE MATH GAME LOGIC ---
    const MAX_TIME = 30;
    let currentCorrectAnswer = 0;
    let score = 0;
    let highScore = 0;
    let timeLeft = MAX_TIME;
    let timerInterval;

    function showGameUI() {
        isGameActive = true;
        document.getElementById('calculator').style.display = 'none';
        document.getElementById('mathGame').style.display = 'block';
        playGameAudio();
    }

    function startMathGame() {
        document.getElementById('gameOverScreen').style.display = 'none';
        score = 0;
        timeLeft = MAX_TIME;
        updateScoreDisplay();
        generateQuestion();
        
        clearInterval(timerInterval);
        timerInterval = setInterval(gameTick, 100);
    }

    function gameTick() {
        timeLeft -= 0.1;
        
        let percentage = (timeLeft / MAX_TIME) * 100;
        let timerBar = document.getElementById('timerBar');
        timerBar.style.width = Math.max(percentage, 0) + '%';
        
        if (percentage > 50) timerBar.style.backgroundColor = '#81c784';
        else if (percentage > 20) timerBar.style.backgroundColor = '#ffeb3b';
        else timerBar.style.backgroundColor = '#e53935';

        if (timeLeft <= 0) {
            endGame();
        }
    }

    function generateQuestion() {
        let level = Math.floor(score / 5);
        
        let num1, num2, operatorSymbol;
        
        if (level === 0) {
            num1 = Math.floor(Math.random() * 20) + 5;
            num2 = Math.floor(Math.random() * 20) + 1;
            operatorSymbol = Math.random() > 0.5 ? '+' : '-';
        } else if (level === 1) {
            let ops = ['+', '-', '*'];
            operatorSymbol = ops[Math.floor(Math.random() * 3)];
            num1 = Math.floor(Math.random() * 50) + 10;
            num2 = operatorSymbol === '*' ? Math.floor(Math.random() * 10) + 2 : Math.floor(Math.random() * 50) + 10;
        } else if (level === 2) {
            let ops = ['*', '/'];
            operatorSymbol = ops[Math.floor(Math.random() * 2)];
            if (operatorSymbol === '*') {
                num1 = Math.floor(Math.random() * 15) + 5;
                num2 = Math.floor(Math.random() * 15) + 5;
            } else {
                num2 = Math.floor(Math.random() * 12) + 2;
                num1 = num2 * (Math.floor(Math.random() * 12) + 2);
            }
        } else {
            let ops = ['+', '-', '*', '/'];
            operatorSymbol = ops[Math.floor(Math.random() * 4)];
            num1 = Math.floor(Math.random() * 100) + 20;
            num2 = operatorSymbol === '*' ? Math.floor(Math.random() * 20) + 5 : 
                   (operatorSymbol === '/' ? (Math.floor(Math.random() * 15) + 2) : Math.floor(Math.random() * 100) + 10);
            
            if (operatorSymbol === '/') num1 = num2 * (Math.floor(Math.random() * 15) + 2);
        }

        if (operatorSymbol === '+') currentCorrectAnswer = num1 + num2;
        if (operatorSymbol === '-') currentCorrectAnswer = num1 - num2;
        if (operatorSymbol === '*') currentCorrectAnswer = num1 * num2;
        if (operatorSymbol === '/') currentCorrectAnswer = num1 / num2;

        document.getElementById('questionDisplay').innerText = `${num1} ${operatorSymbol} ${num2}`;

        let options = [currentCorrectAnswer];
        while (options.length < 4) {
            let variance = Math.floor(Math.random() * 3);
            let wrongAnswer;
            
            if (variance === 0) wrongAnswer = currentCorrectAnswer + (Math.random() > 0.5 ? 1 : -1);
            else if (variance === 1) wrongAnswer = currentCorrectAnswer + (Math.random() > 0.5 ? 10 : -10);
            else wrongAnswer = currentCorrectAnswer + (Math.floor(Math.random() * 20) - 10);
            
            if (wrongAnswer !== currentCorrectAnswer && !options.includes(wrongAnswer)) {
                options.push(wrongAnswer);
            }
        }

        options.sort(() => Math.random() - 0.5);

        for (let i = 0; i < 4; i++) {
            let btn = document.getElementById(`opt${i}`);
            btn.innerText = options[i];
            btn.dataset.value = options[i];
            btn.disabled = false;
        }
    }

    function checkAnswer(buttonIndex) {
        let btn = document.getElementById(`opt${buttonIndex}`);
        let selectedValue = parseInt(btn.dataset.value);

        if (selectedValue === currentCorrectAnswer) {
            score += 1;
            timeLeft = Math.min(timeLeft + 1.5, MAX_TIME);
            updateScoreDisplay();
            
            btn.classList.add('correct-anim');
            setTimeout(() => {
                btn.classList.remove('correct-anim');
                generateQuestion();
            }, 150);
            
        } else {
            timeLeft -= 3;
            document.getElementById('mathGame').classList.add('damage');
            btn.classList.add('wrong-anim');
            
            setTimeout(() => {
                document.getElementById('mathGame').classList.remove('damage');
                btn.classList.remove('wrong-anim');
            }, 300);
        }
    }

    function updateScoreDisplay() {
        document.getElementById('scoreDisplay').innerText = score;
        if (score > highScore) {
            highScore = score;
            document.getElementById('highScoreDisplay').innerText = highScore;
        }
    }

    function endGame() {
        clearInterval(timerInterval);
        document.getElementById('finalScoreDisplay').innerText = score;
        document.getElementById('gameOverScreen').style.display = 'flex';
    }

    function exitGame() {
        clearInterval(timerInterval);
        isGameActive = false;
        document.getElementById('mathGame').style.display = 'none';
        document.getElementById('gameOverScreen').style.display = 'none';
        document.getElementById('calculator').style.display = 'block';
        clearDisplay();
        playGardenAudio();
    }
</script>

</body>
</html>
