<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator & Math Survival Game</title>
    <style>
        /* --- GENERAL --- */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a24;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* --- CALCULATOR STYLES --- */
        .calculator {
            background-color: #2b2b36;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 300px;
            transition: opacity 0.3s ease;
        }

        #display {
            width: 100%;
            height: 60px;
            font-size: 32px;
            text-align: right;
            margin-bottom: 20px;
            padding: 10px;
            box-sizing: border-box;
            border: none;
            background-color: #1e1e26;
            border-radius: 8px;
            color: #00ffcc;
            font-family: monospace;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .calc-btn {
            padding: 20px 0;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #3e3e4a;
            color: #fff;
            transition: background-color 0.2s, transform 0.1s;
        }

        .calc-btn:hover { background-color: #4e4e5a; }
        .calc-btn:active { transform: scale(0.95); }

        .operator { background-color: #ff3366; color: white; }
        .operator:hover { background-color: #ff1a53; }

        .clear { background-color: #555; grid-column: span 2; }
        .clear:hover { background-color: #666; }

        .equal { background-color: #00ffcc; color: #000; grid-column: span 2; }
        .equal:hover { background-color: #00e6b8; }
        
        .zero-btn { grid-column: span 2; }

        /* --- COMPETITIVE GAME STYLES --- */
        .game-container {
            display: none;
            background-color: #121218;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.2);
            width: 340px;
            text-align: center;
            border: 2px solid #00ffcc;
            position: relative;
        }

        .header-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
            color: #aaa;
            font-family: monospace;
        }

        .score-display { color: #00ffcc; font-weight: bold; font-size: 18px; }
        .high-score { color: #ff3366; }

        /* Timer Bar */
        .timer-container {
            width: 100%;
            height: 10px;
            background-color: #333;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #timerBar {
            height: 100%;
            width: 100%;
            background-color: #00ffcc;
            transition: width 0.1s linear, background-color 0.3s;
        }

        .question {
            font-size: 42px;
            font-weight: bold;
            color: #fff;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            font-family: monospace;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: #2b2b36;
            color: #fff;
            border: 2px solid #3e3e4a;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s ease;
            font-family: monospace;
        }

        .option-btn:hover { background-color: #3e3e4a; border-color: #00ffcc; }
        .option-btn:active { transform: scale(0.95); }

        .correct-anim { background-color: #00ffcc !important; color: #000 !important; }
        .wrong-anim { background-color: #ff3366 !important; color: #fff !important; }

        .game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(18, 18, 24, 0.95);
            border-radius: 16px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .game-over-title { color: #ff3366; font-size: 32px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;}
        .final-score { font-size: 48px; color: #00ffcc; margin-bottom: 20px; font-family: monospace;}

        .action-btn {
            background-color: transparent;
            color: #fff;
            border: 2px solid #fff;
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
        }

        .play-again-btn { border-color: #00ffcc; color: #00ffcc; }
        .play-again-btn:hover { background-color: #00ffcc; color: #000; }
        
        .exit-btn { border-color: #555; color: #aaa; }
        .exit-btn:hover { background-color: #555; color: #fff; }

        /* Screen Flash for damage */
        @keyframes flashRed {
            0% { box-shadow: inset 0 0 50px rgba(255, 51, 102, 0.8); }
            100% { box-shadow: inset 0 0 0 rgba(255, 51, 102, 0); }
        }
        .damage { animation: flashRed 0.3s ease-out; }

    </style>
</head>
<body>

<!-- Standard Calculator -->
<div class="calculator" id="calculator">
    <input type="text" id="display" disabled>
    <div class="buttons">
        <button class="calc-btn clear" onclick="clearDisplay()">C</button>
        <button class="calc-btn operator" onclick="appendOperator('/')">&divide;</button>
        <button class="calc-btn operator" onclick="appendOperator('*')">&times;</button>
        
        <button class="calc-btn" onclick="appendNumber('7')">7</button>
        <button class="calc-btn" onclick="appendNumber('8')">8</button>
        <button class="calc-btn" onclick="appendNumber('9')">9</button>
        <button class="calc-btn operator" onclick="appendOperator('-')">-</button>
        
        <button class="calc-btn" onclick="appendNumber('4')">4</button>
        <button class="calc-btn" onclick="appendNumber('5')">5</button>
        <button class="calc-btn" onclick="appendNumber('6')">6</button>
        <button class="calc-btn operator" onclick="appendOperator('+')">+</button>
        
        <button class="calc-btn" onclick="appendNumber('1')">1</button>
        <button class="calc-btn" onclick="appendNumber('2')">2</button>
        <button class="calc-btn" onclick="appendNumber('3')">3</button>
        <button class="calc-btn equal" onclick="calculate()">=</button>
        
        <button class="calc-btn zero-btn" onclick="appendNumber('0')">0</button>
        <button class="calc-btn" onclick="appendNumber('.')">.</button>
    </div>
</div>

<!-- Competitive Math Survival Game -->
<div class="game-container" id="mathGame">
    <div class="header-stats">
        <div class="high-score">BEST: <span id="highScoreDisplay">0</span></div>
        <div class="score-display">SCORE: <span id="scoreDisplay">0</span></div>
    </div>
    
    <div class="timer-container">
        <div id="timerBar"></div>
    </div>

    <div class="question" id="questionDisplay">READY?</div>
    
    <div class="options-grid">
        <button class="option-btn" onclick="checkAnswer(0)" id="opt0">-</button>
        <button class="option-btn" onclick="checkAnswer(1)" id="opt1">-</button>
        <button class="option-btn" onclick="checkAnswer(2)" id="opt2">-</button>
        <button class="option-btn" onclick="checkAnswer(3)" id="opt3">-</button>
    </div>

    <!-- Game Over Overlay -->
    <div class="game-over-screen" id="gameOverScreen">
        <div class="game-over-title">Time's Up</div>
        <div class="final-score" id="finalScoreDisplay">0</div>
        <button class="action-btn play-again-btn" onclick="startMathGame()">Play Again</button>
        <button class="action-btn exit-btn" onclick="exitGame()">Calculator</button>
    </div>
</div>

<script>
    // --- CALCULATOR LOGIC ---
    let display = document.getElementById('display');
    let currentInput = '';
    let isGameActive = false;

    function appendNumber(number) {
        if (number === '.' && currentInput.includes('.')) {
            let parts = currentInput.split(/[+\-*/]/);
            if (parts[parts.length - 1].includes('.')) return;
        }
        currentInput += number;
        updateDisplay();
    }

    function appendOperator(operator) {
        if (currentInput === '') return;
        let lastChar = currentInput.slice(-1);
        if (['+', '-', '*', '/'].includes(lastChar)) {
            currentInput = currentInput.slice(0, -1) + operator;
        } else {
            currentInput += operator;
        }
        updateDisplay();
    }

    function clearDisplay() {
        currentInput = '';
        updateDisplay();
    }

    function calculate() {
        if (currentInput === '' || isGameActive) return;
        
        try {
            let result = new Function('return ' + currentInput)();
            currentInput = Math.round(result * 1000000) / 1000000;
            currentInput = currentInput.toString();
            updateDisplay();
            
            // LAUNCH THE GAME: Wait 1 second so they see the result, then start
            setTimeout(() => {
                if(currentInput !== 'Error' && currentInput !== '') {
                    showGameUI();
                    startMathGame();
                }
            }, 1000);

        } catch (error) {
            display.value = 'Error';
            currentInput = '';
        }
    }

    function updateDisplay() {
        display.value = currentInput;
    }


    // --- COMPETITIVE MATH GAME LOGIC ---
    const MAX_TIME = 30; // Seconds to start
    let currentCorrectAnswer = 0;
    let score = 0;
    let highScore = 0;
    let timeLeft = MAX_TIME;
    let timerInterval;

    function showGameUI() {
        isGameActive = true;
        document.getElementById('calculator').style.display = 'none';
        document.getElementById('mathGame').style.display = 'block';
    }

    function startMathGame() {
        document.getElementById('gameOverScreen').style.display = 'none';
        score = 0;
        timeLeft = MAX_TIME;
        updateScoreDisplay();
        generateQuestion();
        
        clearInterval(timerInterval);
        timerInterval = setInterval(gameTick, 100); // run 10 times a second for smooth bar
    }

    function gameTick() {
        timeLeft -= 0.1;
        
        // Update timer bar visuals
        let percentage = (timeLeft / MAX_TIME) * 100;
        let timerBar = document.getElementById('timerBar');
        timerBar.style.width = Math.max(percentage, 0) + '%';
        
        // Color changes based on time left
        if (percentage > 50) timerBar.style.backgroundColor = '#00ffcc';
        else if (percentage > 20) timerBar.style.backgroundColor = '#ffcc00';
        else timerBar.style.backgroundColor = '#ff3366';

        if (timeLeft <= 0) {
            endGame();
        }
    }

    function generateQuestion() {
        // Difficulty scaling based on current score
        let level = Math.floor(score / 5); // Level up every 5 correct answers
        
        let num1, num2, operatorSymbol;
        
        if (level === 0) {
            // Level 0: Basic addition/subtraction
            num1 = Math.floor(Math.random() * 20) + 5;
            num2 = Math.floor(Math.random() * 20) + 1;
            operatorSymbol = Math.random() > 0.5 ? '+' : '-';
        } else if (level === 1) {
            // Level 1: Medium addition/subtraction + simple multiplication
            let ops = ['+', '-', '*'];
            operatorSymbol = ops[Math.floor(Math.random() * 3)];
            num1 = Math.floor(Math.random() * 50) + 10;
            num2 = operatorSymbol === '*' ? Math.floor(Math.random() * 10) + 2 : Math.floor(Math.random() * 50) + 10;
        } else if (level === 2) {
            // Level 2: Harder multiplication and division
            let ops = ['*', '/'];
            operatorSymbol = ops[Math.floor(Math.random() * 2)];
            if (operatorSymbol === '*') {
                num1 = Math.floor(Math.random() * 15) + 5;
                num2 = Math.floor(Math.random() * 15) + 5;
            } else {
                num2 = Math.floor(Math.random() * 12) + 2;
                num1 = num2 * (Math.floor(Math.random() * 12) + 2); // Ensure clean division
            }
        } else {
            // Level 3+: Intense mode (Triple digits, big multiplication)
            let ops = ['+', '-', '*', '/'];
            operatorSymbol = ops[Math.floor(Math.random() * 4)];
            num1 = Math.floor(Math.random() * 100) + 20;
            num2 = operatorSymbol === '*' ? Math.floor(Math.random() * 20) + 5 : 
                   (operatorSymbol === '/' ? (Math.floor(Math.random() * 15) + 2) : Math.floor(Math.random() * 100) + 10);
            
            if (operatorSymbol === '/') num1 = num2 * (Math.floor(Math.random() * 15) + 2);
        }

        // Calculate correct answer
        if (operatorSymbol === '+') currentCorrectAnswer = num1 + num2;
        if (operatorSymbol === '-') currentCorrectAnswer = num1 - num2;
        if (operatorSymbol === '*') currentCorrectAnswer = num1 * num2;
        if (operatorSymbol === '/') currentCorrectAnswer = num1 / num2;

        document.getElementById('questionDisplay').innerText = `${num1} ${operatorSymbol} ${num2}`;

        // Generate tricky wrong answers
        let options = [currentCorrectAnswer];
        while (options.length < 4) {
            // Create variations: off by 1, off by 10, or random nearby
            let variance = Math.floor(Math.random() * 3);
            let wrongAnswer;
            
            if (variance === 0) wrongAnswer = currentCorrectAnswer + (Math.random() > 0.5 ? 1 : -1);
            else if (variance === 1) wrongAnswer = currentCorrectAnswer + (Math.random() > 0.5 ? 10 : -10);
            else wrongAnswer = currentCorrectAnswer + (Math.floor(Math.random() * 20) - 10);
            
            if (wrongAnswer !== currentCorrectAnswer && !options.includes(wrongAnswer)) {
                options.push(wrongAnswer);
            }
        }

        // Shuffle
        options.sort(() => Math.random() - 0.5);

        // Map to UI
        for (let i = 0; i < 4; i++) {
            let btn = document.getElementById(`opt${i}`);
            btn.innerText = options[i];
            btn.dataset.value = options[i];
            btn.disabled = false;
        }
    }

    function checkAnswer(buttonIndex) {
        let btn = document.getElementById(`opt${buttonIndex}`);
        let selectedValue = parseInt(btn.dataset.value);

        if (selectedValue === currentCorrectAnswer) {
            // Correct: +1 Score, +1.5 Seconds
            score += 1;
            timeLeft = Math.min(timeLeft + 1.5, MAX_TIME); // Cap at max time
            updateScoreDisplay();
            
            // Visual feedback
            btn.classList.add('correct-anim');
            setTimeout(() => {
                btn.classList.remove('correct-anim');
                generateQuestion();
            }, 150);
            
        } else {
            // Wrong: -3 Seconds, Flash Screen
            timeLeft -= 3;
            document.getElementById('mathGame').classList.add('damage');
            btn.classList.add('wrong-anim');
            
            setTimeout(() => {
                document.getElementById('mathGame').classList.remove('damage');
                btn.classList.remove('wrong-anim');
            }, 300);
        }
    }

    function updateScoreDisplay() {
        document.getElementById('scoreDisplay').innerText = score;
        if (score > highScore) {
            highScore = score;
            document.getElementById('highScoreDisplay').innerText = highScore;
        }
    }

    function endGame() {
        clearInterval(timerInterval);
        document.getElementById('finalScoreDisplay').innerText = score;
        document.getElementById('gameOverScreen').style.display = 'flex';
    }

    function exitGame() {
        clearInterval(timerInterval);
        isGameActive = false;
        document.getElementById('mathGame').style.display = 'none';
        document.getElementById('gameOverScreen').style.display = 'none';
        document.getElementById('calculator').style.display = 'block';
        clearDisplay();
    }
</script>

</body>
</html>
